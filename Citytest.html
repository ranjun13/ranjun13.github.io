        // 简化的20题（每题4个选项）
        const questions = [
            { text: "周末早晨，你更希望？", options: ["去博物馆/书店", "约朋友brunch逛街", "睡到自然醒散步", "去公司加班学习"] },
            { text: "对于工作，你最看重？", options: ["高薪快速晋升", "工作生活平衡", "国际化视野", "稳定低压力"] },
            { text: "你理想的居住环境？", options: ["四季分明有雪", "温暖湿润绿意", "干燥清爽阳光", "有空调就行"] },
            { text: "关于美食，你？", options: ["排队打卡网红店", "探索街头地道美食", "健康自己做饭", "随便吃不挑食"] },
            { text: "你更享受的社交？", options: ["热闹聚会夜生活", "小范围深度交流", "线上社交独处", "兴趣社团认识人"] },
            { text: "对于通勤，你能接受？", options: ["1小时+住得舒服", "30分钟地铁直达", "步行骑车可达", "远程不需要通勤"] },
            { text: "你的消费观？", options: ["及时行乐体验", "精打细算储蓄", "投资自己教育", "品质不买平替"] },
            { text: "关于历史文化？", options: ["非常喜欢去古迹", "有点兴趣偶尔看", "更关注当下未来", "无所谓不在意"] },
            { text: "如果生病，你期望？", options: ["家门口三甲", "专科全国顶尖", "社区医院解决", "私立服务好"] },
            { text: "有孩子（或计划），教育？", options: ["必须顶级学区", "国际双语教育", "快乐教育不卷", "还没考虑丁克"] },
            { text: "你更适应的气候？", options: ["北方干燥四季", "南方湿润不冷", "高原凉爽紫外", "沿海舒适台风"] },
            { text: "关于城市包容性？", options: ["移民城市平等", "本地文化浓厚", "能交朋友就行", "国际化大都市"] },
            { text: "理想下班时间？", options: ["6点前有时间", "8点左右接受", "弹性结果导向", "奋斗10点后"] },
            { text: "对于艺术展览演出？", options: ["每月必看", "偶尔关注", "不太关注", "只看线上"] },
            { text: "喜欢的城市景观？", options: ["摩天大楼CBD", "江南小桥流水", "海滨沙滩日落", "山城错落有致"] },
            { text: "关于方言？", options: ["愿意学当地话", "希望普通话", "喜欢听有趣", "能沟通就行"] },
            { text: "你的运动偏好？", options: ["户外跑步骑行", "健身房瑜伽", "球类团队活动", "几乎不运动"] },
            { text: "对于房价态度？", options: ["可以租房不买", "必须买压力小", "好地段背房贷", "家里全款支持"] },
            { text: "看重城市特质？", options: ["创新创业氛围", "历史文化底蕴", "生活舒适幸福", "交通便利四通"] },
            { text: "必须忍受的缺点？", options: ["高房价", "糟糕天气", "缺乏文化", "医疗教育一般"] }
        ];

        // 每题对应维度权重（简化版：每题主要影响2个维度）
        const questionWeights = [
            [2,7], [1,3], [0,0], [5,5], [3,4], [3,8], [1,3], [2,2], [9,9], [7,7],
            [0,0], [6,6], [1,3], [2,6], [0,2], [6,2], [0,4], [1,3], [1,2], [0,2,7,9]
        ];

        let currentQuestion = 0;
        let userScores = new Array(10).fill(5); // 默认中等
        let answers = [];

        function startTest() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.text;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card bg-white border-2 border-gray-200 rounded-xl p-3.5 cursor-pointer flex items-center gap-3 text-sm';
                div.onclick = () => selectOption(idx);
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-600 option-letter flex-shrink-0">${String.fromCharCode(65 + idx)}</div>
                    <div class="flex-1 text-left font-medium leading-snug">${opt}</div>
                `;
                container.appendChild(div);
            });

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';

            document.getElementById('prevBtn').classList.toggle('hidden', currentQuestion === 0);
            updateNextButton(false);
            
            if (answers[currentQuestion] !== undefined) {
                selectOption(answers[currentQuestion], false);
            }
        }

        function selectOption(idx, update = true) {
            const cards = document.querySelectorAll('.option-card');
            cards.forEach((card, i) => {
                if (i === idx) {
                    card.classList.add('selected');
                    card.querySelector('.option-letter').classList.remove('bg-gray-100', 'text-gray-600');
                    card.querySelector('.option-letter').classList.add('bg-white', 'text-purple-600');
                } else {
                    card.classList.remove('selected');
                    card.querySelector('.option-letter').classList.add('bg-gray-100', 'text-gray-600');
                    card.querySelector('.option-letter').classList.remove('bg-white', 'text-purple-600');
                }
            });
            
            if (update) {
                answers[currentQuestion] = idx;
                updateNextButton(true);
                
                // 自动下一题（延迟300ms让用户看到选中效果）
                setTimeout(() => {
                    if (currentQuestion < questions.length - 1) {
                        nextQuestion();
                    }
                }, 300);
            }
        }

        function updateNextButton(enabled) {
            const btn = document.getElementById('nextBtn');
            btn.disabled = !enabled;
            if (enabled) {
                btn.classList.remove('bg-gray-300', 'opacity-50', 'cursor-not-allowed');
                btn.classList.add('bg-gradient-to-r', 'from-purple-600', 'to-pink-600');
            } else {
                btn.classList.add('bg-gray-300', 'opacity-50', 'cursor-not-allowed');
                btn.classList.remove('bg-gradient-to-r', 'from-purple-600', 'to-pink-600');
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                calculateResult();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function calculateResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');
            
            // 计算得分（简化算法）
            userScores = new Array(10).fill(5);
            answers.forEach((ans, qIdx) => {
                const weights = questionWeights[qIdx];
                const score = ans === 0 ? 8 : ans === 1 ? 6 : ans === 2 ? 4 : 2;
                weights.forEach(w => {
                    if (w < 10) userScores[w] = (userScores[w] + score) / 2;
                });
            });

            const texts = ["分析性格维度...", "比对城市数据...", "计算匹配度...", "生成报告..."];
            let step = 0;
            const interval = setInterval(() => {
                if (step < texts.length) {
                    document.getElementById('loadingText').textContent = texts[step];
                    step++;
                } else {
                    clearInterval(interval);
                    showResults();
                }
            }, 400);
        }

        function showResults() {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');

            const matches = Object.entries(cities).map(([name, data]) => {
                const distance = Math.sqrt(
                    data.scores.reduce((sum, score, idx) => sum + Math.pow(score - userScores[idx], 2), 0)
                );
                const similarity = Math.max(0, Math.round(100 - (distance * 8)));
                return { name, ...data, similarity };
            }).sort((a, b) => b.similarity - a.similarity);

            const [first, second, third] = matches;

            document.getElementById('topCityName').textContent = first.name;
            document.getElementById('topCityMatch').textContent = `匹配度 ${first.similarity}%`;
            document.getElementById('topCityReason').textContent = `你们在${getTopDimensions(first)}等方面高度契合。${first.desc}`;
            document.getElementById('topCityAdvice').textContent = first.advice;

            drawRadarChart(first);
            displayCityCard('secondCity', second, 'bg-purple-100 text-purple-800');
            displayCityCard('thirdCity', third, 'bg-pink-100 text-pink-800');
            showDimensionAnalysis();

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getTopDimensions(city) {
            const diffs = city.scores.map((s, i) => ({ dim: dimensions[i], diff: Math.abs(s - userScores[i]) }));
            diffs.sort((a, b) => a.diff - b.diff);
            return diffs.slice(0, 3).map(d => d.dim).join('、');
        }

        function drawRadarChart(topCity) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (Chart.getChart("radarChart")) Chart.getChart("radarChart").destroy();
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: dimensions.map(d => d.slice(0, 4)),
                    datasets: [{
                        label: '你的画像',
                        data: userScores,
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        pointBackgroundColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        pointRadius: 2
                    }, {
                        label: topCity.name,
                        data: topCity.scores,
                        backgroundColor: 'rgba(236, 72, 153, 0.2)',
                        borderColor: 'rgba(236, 72, 153, 1)',
                        pointBackgroundColor: 'rgba(236, 72, 153, 1)',
                        borderWidth: 2,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 10,
                            ticks: { stepSize: 2, font: { size: 8 } },
                            pointLabels: { font: { size: 9 } }
                        }
                    }
                }
            });
        }

        function displayCityCard(id, city, tagClass) {
            const el = document.getElementById(id);
            el.querySelector('h3').textContent = city.name;
            el.querySelector('.match-percent').textContent = city.similarity + '%';
            el.querySelector('.city-desc').textContent = city.desc;
            el.querySelector('.city-tags').innerHTML = city.tags.map(t => 
                `<span class="${tagClass} px-2 py-0.5 rounded-full text-[10px] font-medium">${t}</span>`
            ).join('');
        }

        function showDimensionAnalysis() {
            const analyses = userScores.map((score, i) => ({
                name: dimensions[i],
                score: score.toFixed(1),
                level: score >= 7 ? '高' : score >= 5 ? '中' : '低',
                color: score >= 7 ? 'bg-green-500' : score >= 5 ? 'bg-blue-500' : 'bg-gray-400'
            })).sort((a, b) => b.score - a.score);

            document.getElementById('dimensionAnalysis').innerHTML = analyses.map(a => `
                <div class="flex items-center gap-3 p-2 bg-white/50 rounded-lg">
                    <div class="w-16 text-xs font-medium text-gray-700">${a.name}</div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <div class="flex-1 bg-gray-200 rounded-full h-1.5">
                                <div class="${a.color} h-1.5 rounded-full" style="width: ${a.score * 10}%"></div>
                            </div>
                            <span class="text-xs font-bold w-6">${a.score}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function shareResult() {
            const topCity = document.getElementById('topCityName').textContent;
            const match = document.getElementById('topCityMatch').textContent;
            const text = `我在【城遇】测试中发现，${topCity}是我的天选之城！${match}匹配度。快来测测你的：` + window.location.href;
            
            if (navigator.share) {
                navigator.share({ title: '城遇 - 找到你的天选之城', text: text, url: window.location.href });
            } else {
                // 复制到剪贴板
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('结果已复制到剪贴板，快去分享吧！');
            }
        }

        function restartTest() {
            currentQuestion = 0;
            userScores = new Array(10).fill(5);
            answers = [];
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 触摸优化：防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        // 防止iOS橡皮筋效果
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.hide-scrollbar')) return;
            if (document.body.scrollHeight <= window.innerHeight) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
